<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Budget Tracker</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 500px;
      padding: 30px;
    }

    h1 {
      color: #333;
      font-size: 24px;
      text-align: center;
      margin-bottom: 24px;
    }

    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }

    .input-group input {
      flex: 1;
      padding: 12px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-group input:focus {
      border-color: #2ecc71;
    }

    .input-group input::placeholder {
      color: #aaa;
    }

    .btn-add {
      width: 100%;
      padding: 14px;
      background: #2ecc71;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-bottom: 24px;
    }

    .btn-add:hover {
      background: #27ae60;
    }

    .btn-add:active {
      transform: scale(0.98);
    }

    .expense-list {
      list-style: none;
      margin-bottom: 16px;
      max-height: 320px;
      overflow-y: auto;
    }

    .expense-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      background: #f0faf0;
      border-radius: 8px;
      margin-bottom: 8px;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .expense-item .name {
      font-weight: 500;
      color: #333;
    }

    .expense-item .amount {
      font-weight: 600;
      color: #2ecc71;
      margin-left: auto;
      margin-right: 12px;
    }

    .btn-remove {
      background: none;
      border: none;
      color: #e74c3c;
      font-size: 20px;
      cursor: pointer;
      width: 30px;
      height: 30px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .btn-remove:hover {
      background: #fdecea;
    }

    .total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 14px;
      background: #333;
      color: white;
      border-radius: 8px;
      font-size: 18px;
      font-weight: 700;
    }

    .total-amount {
      color: #2ecc71;
    }

    .empty-state {
      text-align: center;
      color: #aaa;
      padding: 30px 14px;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Daily Budget Tracker</h1>

    <div class="input-group">
      <input type="text" id="nameInput" placeholder="Expense name" autocomplete="off">
      <input type="number" id="amountInput" placeholder="Amount (₦)" min="0">
    </div>

    <button class="btn-add" id="addBtn">Add Expense</button>

    <ul class="expense-list" id="expenseList">
      <li class="empty-state">No expenses added yet</li>
    </ul>

    <div class="total">
      <span>Total</span>
      <span class="total-amount" id="totalDisplay">₦0.00</span>
    </div>
  </div>

  <script>
    const nameInput = document.getElementById('nameInput');
    const amountInput = document.getElementById('amountInput');
    const addBtn = document.getElementById('addBtn');
    const expenseList = document.getElementById('expenseList');
    const totalDisplay = document.getElementById('totalDisplay');

    let expenses = [];

    function formatCurrency(amount) {
      return '₦' + Number(amount).toLocaleString('en-US', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function updateTotal() {
      const total = expenses.reduce((sum, e) => sum + e.amount, 0);
      totalDisplay.textContent = formatCurrency(total);
    }

    function render() {
      expenseList.innerHTML = '';

      if (expenses.length === 0) {
        const li = document.createElement('li');
        li.className = 'empty-state';
        li.textContent = 'No expenses added yet';
        expenseList.appendChild(li);
        return;
      }

      expenses.forEach((expense, index) => {
        const li = document.createElement('li');
        li.className = 'expense-item';

        const nameSpan = document.createElement('span');
        nameSpan.className = 'name';
        nameSpan.textContent = expense.name;

        const amountSpan = document.createElement('span');
        amountSpan.className = 'amount';
        amountSpan.textContent = formatCurrency(expense.amount);

        const removeBtn = document.createElement('button');
        removeBtn.className = 'btn-remove';
        removeBtn.innerHTML = '&times;';
        removeBtn.setAttribute('aria-label', 'Remove expense');
        removeBtn.addEventListener('click', () => {
          expenses.splice(index, 1);
          render();
          updateTotal();
        });

        li.appendChild(nameSpan);
        li.appendChild(amountSpan);
        li.appendChild(removeBtn);
        expenseList.appendChild(li);
      });
    }

    function addExpense() {
      const name = nameInput.value.trim();
      const amount = parseFloat(amountInput.value);

      if (!name) {
        nameInput.focus();
        return;
      }

      if (isNaN(amount) || amount <= 0) {
        amountInput.focus();
        return;
      }

      expenses.push({ name, amount });
      render();
      updateTotal();

      nameInput.value = '';
      amountInput.value = '';
      nameInput.focus();
    }

    addBtn.addEventListener('click', addExpense);

    nameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        amountInput.focus();
      }
    });

    amountInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        addExpense();
      }
    });
  </script>
</body>
</html>
